<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carol Li</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap');
:root{
  --pink:#ff2d78;--glow:rgba(255,45,120,.5);--dim:rgba(255,45,120,.12);
  --bg:#060608;--bg2:#0d0d12;--bg3:#111118;
  --text:#ffffff;--muted:#ffffff;--line:#1c1c26;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--pink);border-radius:2px}

nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  display:flex;justify-content:space-between;align-items:center;
  padding:1rem 2.5rem;
  background:rgba(6,6,8,.85);backdrop-filter:blur(20px);
  border-bottom:1px solid #ffffff06;
}
.logo{font-family:'Space Mono',monospace;font-weight:700;font-size:.9rem;color:#ffffff;letter-spacing:3px}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:#ffffff;text-decoration:none;font-size:1rem;letter-spacing:2px;transition:color .3s;font-family:'Space Mono',monospace;font-weight:400}
.nav-links a:hover{color:var(--pink)}

#hero{
  height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
#brainCanvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair}
.hero-top{
  position:relative;z-index:2;text-align:center;pointer-events:none;
  margin-bottom:1rem;
}
.hero-eyebrow{font-family:'Space Mono',monospace;font-size:.85rem;letter-spacing:1.5px;color:#ffffff;margin-bottom:.8rem;opacity:1}
.hero-name{
  font-size:clamp(2.8rem,7vw,5.5rem);font-weight:700;line-height:1;
  background:linear-gradient(135deg,#fff 20%,var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 40px var(--glow));
}
.hero-sub{margin-top:.6rem;font-size:.85rem;color:#ffffff;letter-spacing:1.5px;font-family:'Space Mono',monospace}

#tooltip{
  position:fixed;z-index:400;pointer-events:none;
  background:rgba(6,6,8,.92);border:1px solid var(--pink);
  padding:.5rem 1rem;border-radius:8px;
  font-family:'Space Mono',monospace;font-size:.75rem;color:#ffffff;
  letter-spacing:1px;white-space:nowrap;
  box-shadow:0 0 20px var(--glow);
  opacity:0;transition:opacity .2s;
}

.hint{
  position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
  z-index:2;font-family:'Space Mono',monospace;font-size:1rem;
  color:#ffffff;letter-spacing:2px;text-align:center;white-space:nowrap;
}
.hint span{color:#ffffff}

#panel{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity .4s;
}
#panel.open{opacity:1;pointer-events:all}
#panel-bg{position:absolute;inset:0;background:rgba(6,6,8,.92);backdrop-filter:blur(24px)}
#panel-box{
  position:relative;z-index:1;
  width:min(700px,92vw);max-height:82vh;overflow-y:auto;
  background:var(--bg2);border:1px solid rgba(255,180,210,.45);
  border-radius:20px;padding:2.5rem;
  box-shadow:0 0 30px rgba(255,180,210,.18),0 0 60px rgba(255,150,190,.08);
  transform:scale(.94);transition:transform .4s;
}
#panel.open #panel-box{transform:scale(1)}
#panel-close{
  position:absolute;top:1.2rem;right:1.4rem;
  background:none;border:none;color:#ffffff;font-size:1.4rem;
  cursor:pointer;transition:color .2s;font-family:'Space Mono',monospace;line-height:1;
}
#panel-close:hover{color:var(--pink)}
.panel-tag{font-family:'Montserrat',sans-serif;font-size:.65rem;letter-spacing:3px;color:var(--pink);margin-bottom:.5rem;font-weight:600}
.panel-title{font-size:1.9rem;font-weight:700;margin-bottom:.3rem;color:#ffffff;font-family:'Montserrat',sans-serif}
.panel-title span{color:var(--pink)}
.panel-divider{width:40px;height:2px;background:var(--pink);box-shadow:0 0 8px var(--glow);border-radius:2px;margin:1rem 0 1.6rem}
.panel-grid{display:grid;gap:.9rem}
.panel-grid.col2{grid-template-columns:1fr 1fr}
.pcard{background:var(--bg3);border:1px solid var(--line);border-radius:12px;padding:1.2rem;transition:border-color .3s,transform .3s}
.pcard:hover{border-color:var(--pink);transform:translateY(-3px)}
.pcard-icon{font-size:1.3rem;margin-bottom:.6rem}
.pcard-title{font-weight:600;font-size:.95rem;margin-bottom:.3rem;color:#ffffff;font-family:'Montserrat',sans-serif}
.pcard-desc{font-size:.82rem;color:#ffffff;line-height:1.65;font-family:'Montserrat',sans-serif}
.ptag{display:inline-block;margin-top:.6rem;font-family:'Space Mono',monospace;font-size:.62rem;padding:.2rem .55rem;border-radius:999px;background:var(--dim);color:var(--pink);letter-spacing:.5px}
.big-stat{text-align:center;padding:1.5rem}
.big-num{font-size:3rem;font-weight:700;color:var(--pink);font-family:'Space Mono',monospace;text-shadow:0 0 30px var(--glow)}
.big-label{color:#ffffff;font-size:.75rem;letter-spacing:2px;margin-top:.3rem}
.clinks{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:1rem}
.clink{display:flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border:1px solid var(--line);border-radius:9px;color:#ffffff;text-decoration:none;font-size:.85rem;background:var(--bg3);transition:all .3s}
.clink:hover{border-color:var(--pink);color:var(--pink);transform:translateY(-2px)}
::-webkit-scrollbar{width:3px}
@media(max-width:600px){
  .panel-grid.col2{grid-template-columns:1fr}
  #panel-box{padding:1.8rem 1.3rem}
}
</style>
</head>

    <div class="panel-title" style="font-size:1.5rem;letter-spacing:2px;font-family:'Montserrat',sans-serif;font-weight:700;color:#ffffff;margin-bottom:0">OCCIPITAL LOBE · <span>VISUAL PROCESSING &amp; PERCEPTION</span></div>
    <div class="panel-divider"></div>
    <p style="line-height:2;font-size:.95rem;margin-bottom:1rem;font-family:'Montserrat',sans-serif">I build in AI and science, but art is where I interrogate power, perception, and what it means to be human.</p>
    <p style="line-height:2;font-size:.95rem;margin-bottom:1rem;font-family:'Montserrat',sans-serif">As an Art History minor, I spend time studying how culture is constructed, who decides what becomes canon, and how institutions shape collective memory. I'm drawn to the invisible structures behind visibility.</p>
    <div class="pcard" style="border-color:rgba(255,180,210,.35);margin-bottom:.9rem">
      <div class="pcard-title" style="font-family:'Montserrat',sans-serif;margin-bottom:.7rem">Exhibition for the Blind</div>
      <div class="pcard-desc" style="font-family:'Montserrat',sans-serif;margin-bottom:.8rem">I curated an exhibition designed for the blind, rethinking how visual art can be translated into sound, texture, and narrative. I also helped translate a film about Vincent van Gogh for visually impaired audiences, exploring how emotion survives even when sight does not.</div>

// ═══════════════════════════════════════════════
//  ANATOMICALLY ACCURATE 3D BRAIN
//
//  Coordinate system (right-hand, viewer-facing):
//    X: left(-) → right(+)  [medial-lateral]
//    Y: up(-) → down(+)     [superior-inferior, inverted for canvas]
//    Z: back(-) → front(+)  [posterior-anterior]
//
//  Real lobe boundaries (normalised to unit scale):
//    Frontal:   anterior to central sulcus  → Z > 0.05, Y < 0.25
//    Parietal:  between central & parietooccipital sulcus → Z 0.05 to -0.35, Y < 0.1
//    Temporal:  inferior lateral → |X| > 0.35, Y > 0.0
//    Occipital: posterior to parietooccipital sulcus → Z < -0.35
// ═══════════════════════════════════════════════

const canvas = document.getElementById('brainCanvas');
const ctx = canvas.getContext('2d');
const tip = document.getElementById('tooltip');

let W, H, cx, cy;
function resize(){
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
  cx = W/2; cy = H/2;
}
resize();
window.addEventListener('resize', ()=>{ resize(); makeBrain(); buildEdges(); });

// ── Anatomical lobe definitions ──
// centroid positions reflect true anatomical centres of mass for each lobe
// viewed from lateral-left perspective (standard neurological convention)
const REGIONS = [
  {
    id:'frontal',

    cx3: 0.0,  cy3: -0.28, cz3:  0.45,
    // Label anchor: pushed far anterior + upward, clearly outside brain

  },
  {

    cx3: 0.0,  cy3: -0.32, cz3: -0.18,
    // Label anchor: pushed far superior, slightly posterior
    lx3: 0.95, ly3: -1.10, lz3: -0.20,

  },

// ── Brain surface generation ──
// Uses a parametric brain mesh based on published sulcal topology.
// The shape is derived from MNI152 average brain proportions:
//   - Anterior-posterior length ≈ 1.4× the width
//   - Superior-inferior height ≈ 0.85× the width
//   - Distinct frontal prominence (anterior bowing)
//   - Occipital pole protrusion
//   - Temporal lobe inferior shelf
//   - Inter-hemispheric fissure along superior midline
//   - Central sulcus furrow at approximately 40% from anterior

function brainRadius(theta, phi){
  // theta = azimuthal (0→2π, x-z plane), phi = polar (0→π, top→bottom)
  const ct = Math.cos(theta), st = Math.sin(theta);
  const cp = Math.cos(phi),   sp = Math.sin(phi);

  // Base ellipsoid (A-P elongated, narrow S-I)
  // X scaled ×0.78, Y scaled ×0.72, Z scaled ×1.0
  let r = 1.0;

  // ── Anterior (frontal) prominence ──
  // Frontal lobe bulges forward (+Z) and slightly up
  const frontalBulge = 0.18 * Math.exp(-4 * (theta - Math.PI/2)**2) * Math.exp(-2*(phi - Math.PI/2)**2);
  r += frontalBulge;

  // ── Occipital pole ──
  // Posterior protrusion, slightly inferior
  const occBulge = 0.14 * Math.exp(-5 * (theta - 3*Math.PI/2)**2) * Math.exp(-3*(phi - 0.6*Math.PI)**2);
  r += occBulge;

  // ── Temporal shelf ──
  // Inferior temporal lobe bulges laterally and downward
  // Present on both left & right (bilateral), at inferior aspect
  const tempL = 0.12 * Math.exp(-6*(theta - Math.PI/4)**2) * Math.exp(-4*(phi - 0.72*Math.PI)**2);
  const tempR = 0.12 * Math.exp(-6*(theta - 7*Math.PI/4)**2) * Math.exp(-4*(phi - 0.72*Math.PI)**2);
  r += tempL + tempR;

  // ── Parietal superior convexity ──
  const parBulge = 0.07 * Math.exp(-4*(theta - Math.PI)**2) * Math.exp(-5*(phi - 0.35*Math.PI)**2);
  r += parBulge;

  // ── Inter-hemispheric fissure (superior midline indentation) ──
  // Medial sagittal sulcus running A-P at the top
  const fissure = -0.09 * Math.exp(-12 * ct**2) * Math.exp(-4*(phi - 0.12*Math.PI)**2);
  r += fissure;

  // ── Central sulcus ──
  // Transverse groove at ~40% from anterior (theta≈π/2 +offset), superior surface
  const centralSulcus = -0.06
    * Math.exp(-18*(theta - 0.85*Math.PI/2 + 0.3)**2)
    * Math.exp(-3*(phi - 0.3*Math.PI)**2);
  r += centralSulcus;

  // ── Sylvian fissure (lateral sulcus) ──
  // Deep groove separating temporal from frontal/parietal, lateral surface
  const sylvL = -0.08 * Math.exp(-10*(theta - Math.PI/3)**2) * Math.exp(-12*(phi - 0.52*Math.PI)**2);
  const sylvR = -0.08 * Math.exp(-10*(theta - 5*Math.PI/3)**2) * Math.exp(-12*(phi - 0.52*Math.PI)**2);
  r += sylvL + sylvR;

  // ── General gyral texture (minor undulation) ──
  r += 0.025 * Math.cos(5*theta) * Math.sin(4*phi)
     + 0.018 * Math.cos(7*theta + 1.2) * Math.sin(6*phi + 0.8)
     + 0.012 * Math.cos(9*phi);

  return Math.max(r, 0.55);
}

// Convert spherical (r,theta,phi) → Cartesian with brain proportions
function sphereToCart(r, theta, phi){
  const sp = Math.sin(phi);
  const x = r * sp * Math.cos(theta) * 0.78;   // left-right (narrower)
  const y = r * Math.cos(phi)        * 0.72;   // superior-inferior
  const z = r * sp * Math.sin(theta) * 1.00;   // anterior-posterior
  return {x, y, z};
}

const pts = [];

function classifyPoint(x, y, z){
  // Try each region's anatomical classifier
  for(const r of REGIONS){
    if(r.classify(x, y, z)) return r;
  }
  // Fallback: nearest centroid
  let best = REGIONS[0], bestD = 1e9;
  for(const r of REGIONS){
    const d = (x-r.cx3)**2 + (y-r.cy3)**2 + (z-r.cz3)**2;
    if(d < bestD){ bestD = d; best = r; }
  }
  return best;
}

function makeBrain(){
  pts.length = 0;
  const N = 550;

  for(let i = 0; i < N; i++){
    // Stratified sampling over sphere surface for even distribution
    // Using Fibonacci / golden-angle spiral for uniform coverage
    const goldenAngle = Math.PI * (3 - Math.sqrt(5));
    const phi_norm = i / (N - 1);                     // 0→1 from top to bottom
    const phi = Math.acos(1 - 2 * phi_norm);          // polar angle
    const theta = (goldenAngle * i) % (Math.PI * 2);  // azimuthal angle

    // Add slight random jitter to break grid artefacts
    const phiJ   = phi   + (Math.random() - 0.5) * 0.12;
    const thetaJ = theta + (Math.random() - 0.5) * 0.18;

    const r = brainRadius(thetaJ, phiJ);
    const {x, y, z} = sphereToCart(r, thetaJ, phiJ);

    // Exclude deep inferior region (brain stem / cerebellum area)
    // In MNI space the inferior flat cut is at ~y > 0.6 (normalised)
    if(y > 0.58) continue;

    const region = classifyPoint(x, y, z);
    pts.push({ ox:x, oy:y, oz:z, x:0, y:0, z:0, region });
  }
}
makeBrain();

// ── Edges: connect nearby points within same or adjacent lobe ──
let edges = [];
function buildEdges(){
  edges = [];
  // Shorter max distance → tighter, more gyrus-like mesh
  const maxD = 0.24;
  const prob  = 0.30;
  for(let i = 0; i < pts.length; i++){
    for(let j = i+1; j < pts.length; j++){
      const dx = pts[i].ox - pts[j].ox;
      const dy = pts[i].oy - pts[j].oy;
      const dz = pts[i].oz - pts[j].oz;
      const d  = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if(d < maxD && Math.random() < prob) edges.push([i, j]);
    }
  }
}
buildEdges();

// ── Rotation state ──
let rotY = 0.3, rotX = -0.12; // slight lateral tilt to show lobe distribution naturally
let dragging = false, lastMX = 0, lastMY = 0;
let autoSpin = true;
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousedown', e=>{ dragging=true; autoSpin=false; lastMX=e.clientX; lastMY=e.clientY; });
canvas.addEventListener('mousemove', e=>{
  mouseX = e.clientX; mouseY = e.clientY;
  if(dragging){
    rotY += (e.clientX - lastMX) * 0.008;
    rotX += (e.clientY - lastMY) * 0.005;
    rotX  = Math.max(-0.65, Math.min(0.65, rotX));
    lastMX = e.clientX; lastMY = e.clientY;
  }
});
canvas.addEventListener('mouseup',    ()=>{ dragging = false; });
canvas.addEventListener('mouseleave', ()=>{ dragging = false; hideTip(); });
canvas.addEventListener('click',      e=>handleClick(e));

canvas.addEventListener('touchstart', e=>{ autoSpin=false; lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY; });
canvas.addEventListener('touchmove',  e=>{
  e.preventDefault();
  rotY += (e.touches[0].clientX - lastMX) * 0.008;
  rotX += (e.touches[0].clientY - lastMY) * 0.005;
  lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
},{ passive: false });

// ── Project 3D → 2D with perspective ──
const SCALE = ()=> Math.min(W, H) * 0.50;

function project(x, y, z){
  // Rotate Y (yaw)
  const x1 = x * Math.cos(rotY) - z * Math.sin(rotY);
  const z1 = x * Math.sin(rotY) + z * Math.cos(rotY);
  // Rotate X (pitch)
  const y2 = y * Math.cos(rotX) - z1 * Math.sin(rotX);
  const z2 = y * Math.sin(rotX) + z1 * Math.cos(rotX);
  const fov = 2.6, sc = SCALE();
  const p = fov / (fov + z2);
  return { sx: cx + x1*sc*p, sy: cy + y2*sc*p, z: z2, p };
}

// ── Hover hit detection ──
let hoveredRegion = null;
function findHovered(){
  let best = null, bestZ = -1e9, bestDist = 26;
  for(const pt of pts){
    const dx = pt.x - mouseX, dy = pt.y - mouseY;
    const d = Math.sqrt(dx*dx + dy*dy);
    if(d < bestDist && pt.z > bestZ){ bestZ = pt.z; best = pt; bestDist = d; }
  }
  return best ? best.region : null;
}

function showTip(r, mx, my){ /* disabled — label shown on canvas */ }
function hideTip(){ tip.style.opacity = '0'; }

function handleClick(e){
  if(hoveredRegion) openPanel(hoveredRegion.id);
}

// ── Render loop ──
let t = 0;
function draw(){
  ctx.clearRect(0, 0, W, H);
  if(autoSpin) rotY += 0.004;
  t += 0.012;

  // Project all points
  for(const p of pts){
    const proj = project(p.ox, p.oy, p.oz);
    p.x = proj.sx; p.y = proj.sy; p.z = proj.z; p.p = proj.p;
  }

  hoveredRegion = findHovered();
  canvas.style.cursor = hoveredRegion ? 'pointer' : 'crosshair';
  if(hoveredRegion) showTip(hoveredRegion, mouseX, mouseY);
  else hideTip();

  // Draw edges
  for(const [i, j] of edges){
    const a = pts[i], b = pts[j];
    const avgZ  = (a.z + b.z) / 2;
    const depth = (avgZ + 1.8) / 3.6;
    const isHov = hoveredRegion && (a.region === hoveredRegion || b.region === hoveredRegion);
    ctx.beginPath();
    ctx.strokeStyle = isHov ? a.region.color : '#ff2d78';
    ctx.globalAlpha = isHov ? depth * 0.80 + 0.15 : depth * 0.50 + 0.12;
    ctx.lineWidth   = isHov ? 1.2 : 0.7;
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Draw nodes (painter's algorithm — back to front)
  const sorted = [...pts].sort((a, b)=> a.z - b.z);
  for(const p of sorted){
    const depth = (p.z + 1.8) / 3.6;
    const isHov = hoveredRegion && p.region === hoveredRegion;
    const r     = p.p * (isHov ? 4.2 : 2.6);
    const col   = p.region.color;

    if(isHov){
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 4.5, 0, Math.PI*2);
      ctx.fillStyle   = col;
      ctx.globalAlpha = 0.12;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fillStyle   = col;
    ctx.globalAlpha = isHov ? 0.95 : depth * 0.80 + 0.20;
    ctx.shadowColor = col;
    ctx.shadowBlur  = isHov ? 16 : 8;
    ctx.fill();
    ctx.shadowBlur  = 0;
    ctx.globalAlpha = 1;
  }

  // Draw lobe labels — true 3D, re-projected every frame, never cached
  for(const reg of REGIONS){
    // Label anchor: centroid pushed outward from brain origin
    const scale = 1.72;
    const lx3 = reg.cx3 * scale;
    const ly3 = reg.cy3 * scale;
    const lz3 = reg.cz3 * scale;

    const lp   = project(lx3, ly3, lz3);   // label position
    const cp   = project(reg.cx3, reg.cy3, reg.cz3); // dot on brain surface

    if(lp.z < -1.4) continue;

    const isHov = hoveredRegion === reg;
    const alpha = isHov ? 1.0 : 0.82;

    // ── Connector line ──
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cp.sx, cp.sy);
    ctx.lineTo(lp.sx, lp.sy);
    ctx.strokeStyle = '#ffffff';
    ctx.globalAlpha = isHov ? 0.65 : 0.28;
    ctx.lineWidth   = isHov ? 1.2 : 0.6;
    ctx.setLineDash([3, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // ── Dot on brain surface ──
    ctx.save();
    ctx.beginPath();
    ctx.arc(cp.sx, cp.sy, isHov ? 3.5 : 2, 0, Math.PI*2);
    ctx.fillStyle   = '#ffffff';
    ctx.globalAlpha = isHov ? 1.0 : 0.45;
    ctx.shadowColor = '#ffffff';
    ctx.shadowBlur  = isHov ? 10 : 0;
    ctx.fill();
    ctx.restore();

    // ── Label ──
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font        = `${isHov ? '700' : '600'} 18px 'Space Mono', monospace`;
    ctx.fillStyle   = '#ffffff';
    ctx.textAlign   = 'center';
    ctx.shadowBlur  = 0;
    ctx.fillText(reg.label, lp.sx, lp.sy);
    // sublabel always visible
    ctx.globalAlpha = isHov ? 0.85 : 0.60;
    ctx.font        = `400 13px 'Space Mono', monospace`;
    ctx.fillText(reg.sublabel, lp.sx, lp.sy + 22);
    ctx.restore();
  }

  // ── "This is Carol's Brain" annotation ──
  const aLabelX = W * 0.14;
  const aLabelY = H * 0.78;
  const aTipX   = cx - W * 0.14;
  const aTipY   = cy + H * 0.05;

  ctx.save();
  ctx.strokeStyle = '#ffffff';
  ctx.fillStyle   = '#ffffff';
  ctx.globalAlpha = 0.85;
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';
  ctx.shadowBlur  = 0;

  ctx.beginPath();
  ctx.moveTo(aLabelX, aLabelY - 10);
  ctx.lineTo(aTipX, aTipY);
  ctx.stroke();

  const angle = Math.atan2(aTipY - (aLabelY - 10), aTipX - aLabelX);
  const aLen  = 14;
  ctx.beginPath();
  ctx.moveTo(aTipX, aTipY);
  ctx.lineTo(aTipX - aLen * Math.cos(angle - 0.38), aTipY - aLen * Math.sin(angle - 0.38));
  ctx.lineTo(aTipX - aLen * Math.cos(angle + 0.38), aTipY - aLen * Math.sin(angle + 0.38));
  ctx.closePath();
  ctx.fill();

  ctx.font      = `600 15px 'Space Mono', monospace`;
  ctx.textAlign = 'center';
  ctx.fillText("This is Carol's Brain", aLabelX, aLabelY + 10);
  ctx.restore();

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
